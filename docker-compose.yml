



services:



  # ── PostgreSQL ───────────────────────────────────────────────────────────────

  db:

    image: postgres:16-alpine

    restart: unless-stopped

    environment:

      POSTGRES_DB:       orbitbet

      POSTGRES_USER:     orbitbet

      POSTGRES_PASSWORD: orbitbet_secret

    volumes:

      - pgdata:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U orbitbet -d orbitbet"]

      interval: 5s

      timeout: 5s

      retries: 10



  # ── FastAPI backend ──────────────────────────────────────────────────────────

  backend:

    build:

      context: ./backend

      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:

      db:

        condition: service_healthy

    environment:

      DATABASE_URL:                  postgresql://orbitbet:orbitbet_secret@db:5432/orbitbet

      SECRET_KEY:                    mysecretkeypassword

      ALGORITHM:                     HS256

      ACCESS_TOKEN_EXPIRE_MINUTES:   60

      REFRESH_TOKEN_EXPIRE_DAYS:     30

      CORS_ORIGINS:                  http://localhost,http://localhost:80

    ports:

      - "8000:8000"

    healthcheck:

      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]

      interval: 10s

      timeout: 5s

      retries: 5



  # ── React frontend (nginx) ───────────────────────────────────────────────────

  frontend:

    build:

      context: ./frontend

      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:

      backend:

        condition: service_healthy

    ports:

      - "80:80"



volumes:

  pgdata: